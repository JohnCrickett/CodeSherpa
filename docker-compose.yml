services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: codesherpa
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/init.sql:/opt/oracle/scripts/startup/init.sql
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s codesherpa/codesherpa@localhost:1521/FREEPDB1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      ORACLE_DSN: oracle-db:1521/FREEPDB1
      ORACLE_USER: codesherpa
      ORACLE_PASSWORD: codesherpa
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    deploy:
      resources:
        limits:
          memory: 6g
    volumes:
      - repo-cache:/root/.cache/codesherpa
    depends_on:
      oracle-db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  oracle-data:
  repo-cache:
